<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK - Home</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background-color: #000; color: #fff; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #262626; position: sticky; top: 0; background: #000; z-index: 100; }
    .feed-container { max-width: 470px; margin: 0 auto; padding-bottom: 70px; }
    .post-card { border-bottom: 1px solid #262626; margin-bottom: 15px; background: #000; }
    .post-header { display: flex; align-items: center; padding: 10px 12px; }
    .post-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; margin-right: 10px; background: #333; }
    .post-username { font-weight: 600; font-size: 14px; color: #fff; text-decoration: none; }
    .post-media-box { width: 100%; max-height: 550px; background: #111; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .post-media { width: 100%; height: auto; object-fit: cover; max-height: 550px; }
    .post-actions { display: flex; padding: 10px 12px; gap: 15px; font-size: 22px; cursor: pointer; }
    .post-details { padding: 0 12px 12px 12px; font-size: 14px; }
    .likes-count { font-weight: 600; margin-bottom: 5px; }
    .caption-text span { font-weight: 600; margin-right: 6px; }
    .comments-section { margin-top: 8px; font-size: 13px; color: #aaa; max-height: 80px; overflow-y: auto; }
    .comment-input-box { display: flex; border-top: 1px solid #222; padding: 8px 12px; }
    .comment-input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 13px; }
    .comment-submit { background: transparent; border: none; color: #0095f6; font-weight: 600; cursor: pointer; }
    
    /* Bottom Navigation Bar */
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
    .bottom-nav a { font-size: 22px; text-decoration: none; color: #fff; }
  </style>
</head>
<body>

  <div class="top-bar">
    <div style="font-family: cursive; font-size: 22px; font-weight: bold;">RHK</div>
    <div>
      <a href="upload.html?type=post" style="color: #fff; text-decoration: none; font-size: 20px; margin-right: 15px;">➕</a>
    </div>
  </div>

  <div class="feed-container" id="feedContainer">
    <div style="text-align: center; color: #888; margin-top: 40px;">Loading posts...</div>
  </div>

  <!-- Bottom Navigation Bar -->
  <div class="bottom-nav">
    <a href="home.html">🏠</a>
    <a href="explore.html">🔍</a>
    <a href="upload.html?type=post">➕</a>
    <a href="profile.html">👤</a>
  </div>

  <script type="module" src="js/home.js"></script>
</body>
</html>
