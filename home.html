<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK Feed</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Top Navigation Bar -->
  <header class="top-nav">
    <div class="rhk-brand-logo">RHK</div>
    <div class="top-icons">
      <a href="upload.html" id="createPostBtn">
        <svg viewBox="0 0 24 24"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg>
      </a>
      <a href="direct.html" id="messagesBtn">
        <svg viewBox="0 0 24 24"><path d="M12 2.04c-5.5 0-10 4.2-10 9.36 0 2.9 1.4 5.5 3.6 7.2V22l3.5-1.9c.9.2 1.9.3 2.9.3 5.5 0 10-4.2 10-9.36s-4.5-9.36-10-9.36zm0 16.7c-.8 0-1.6-.1-2.3-.4l-2.1 1.1v-2.1c-1.8-1.5-2.8-3.7-2.8-6.1 0-4.2 3.8-7.6 8.5-7.6s8.5 3.4 8.5 7.6-3.8 7.5-8.8 7.5z"/></svg>
      </a>
    </div>
  </header>

  <!-- Stories Tray -->
  <div class="stories-container" id="storiesContainer">
    <div class="story-item" onclick="window.location.href='upload.html'">
      <div style="position: relative;">
        <div class="story-ring" style="background: #333;">
          <div class="story-img" id="userStoryAvatar" style="background-image: url('');"></div>
        </div>
        <div style="position: absolute; bottom: 0; right: 0; background: #0095f6; width: 20px; height: 20px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid #000; font-size: 14px; font-weight: bold;">+</div>
      </div>
      <span class="story-username">Your story</span>
    </div>
  </div>

  <!-- Main Feed Stream -->
  <main id="feedContainer">
    <!-- Dynamically loaded posts -->
  </main>

  <!-- Bottom Navigation Bar -->
  <nav class="bottom-nav">
    <a href="home.html">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
    <a href="explore.html">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </a>
    <a href="reels.html">
      <svg viewBox="0 0 24 24"><path d="M18 3H6c-1.66 0-3 1.34-3 3v12c0 1.66 1.34 3 3 3h12c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3zm-9 13.5v-9l7 4.5-7 4.5z"/></svg>
    </a>
    <a href="direct.html">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </a>
    <a href="profile.html">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </a>
  </nav>

  <script type="module" src="js/home.js"></script>
</body>
</html>
