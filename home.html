<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK Feed</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="top-nav">
    <div class="rhk-brand-logo">RHK</div>
    <div class="top-icons">
      <svg id="openUploadModal" viewBox="0 0 24 24"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg>
      <a href="direct.html">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </a>
    </div>
  </header>

  <div class="stories-container" id="storiesContainer">
    <div class="story-item" onclick="window.location.href='upload.html?type=story'">
      <div style="position: relative;">
        <div class="story-ring" style="background: #333;">
          <div class="story-img" id="userStoryAvatar" style="background-image: url('');"></div>
        </div>
        <div style="position: absolute; bottom: 0; right: 0; background: #0095f6; width: 20px; height: 20px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid #000; font-size: 14px; font-weight: bold;">+</div>
      </div>
      <span class="story-username">Your story</span>
    </div>
  </div>

  <main id="feedContainer">
    <p style="text-align: center; padding: 40px; color: #888;">Loading feed...</p>
  </main>

  <div class="modal-overlay" id="uploadModal">
    <div class="modal-sheet">
      <div style="text-align: center; font-weight: 700; margin-bottom: 5px; color: #fff;">Create New</div>
      <div class="modal-option" onclick="window.location.href='upload.html?type=post'">Post (Image Only)</div>
      <div class="modal-option" onclick="window.location.href='upload.html?type=story'">Story (Photo & Video)</div>
      <div class="modal-option" onclick="window.location.href='upload.html?type=reel'">Reel (Photo & Video)</div>
      <div class="modal-option" style="background: #333; margin-top: 5px;" onclick="closeModal()">Cancel</div>
    </div>
  </div>

  <div class="story-viewer-overlay" id="storyViewer">
    <div style="padding: 10px 15px; display: flex; flex-direction: column; gap: 8px;">
      <div style="display: flex; gap: 4px; width: 100%;">
        <div style="flex: 1; height: 2px; background: rgba(255,255,255,0.8); border-radius: 2px;"></div>
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center; gap: 10px;">
          <div id="viewerUserAvatar" style="width: 32px; height: 32px; border-radius: 50%; background-size: cover; background-position: center; cursor: pointer;"></div>
          <span id="viewerUsername" style="font-weight: 600; font-size: 14px; cursor: pointer;">username</span>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
          <svg id="closeStoryViewer" style="width: 26px; height: 26px; fill: #fff; cursor: pointer;" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </div>
      </div>
    </div>

    <div style="flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;" id="viewerMediaContainer"></div>

    <div style="padding: 12px 15px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.8);">
      <input type="text" class="input-field" placeholder="Send message" style="margin-bottom: 0; border-radius: 20px; background: transparent; border: 1px solid rgba(255,255,255,0.4);">
      <svg style="width: 24px; height: 24px; fill: #fff; cursor: pointer; flex-shrink: 0;" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="home.html"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
    <a href="explore.html"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></a>
    <a href="reels.html"><svg viewBox="0 0 24 24"><path d="M18 3H6c-1.66 0-3 1.34-3 3v12c0 1.66 1.34 3 3 3h12c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3zm-9 13.5v-9l7 4.5-7 4.5z"/></svg></a>
    <a href="#" id="navPlusBtn"><svg viewBox="0 0 24 24"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg></a>
    <a href="profile.html"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg></a>
  </nav>

  <script type="module" src="js/home.js"></script>
</body>
</html>
