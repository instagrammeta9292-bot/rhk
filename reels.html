<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK Reels</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div style="padding: 20px; font-weight: 700; font-size: 18px; border-bottom: 1px solid #262626;">Reels Stream</div>
  <div id="reelsContainer"></div>
  <a href="home.html" style="color: #0095f6; padding: 20px; display: block;">Back to Home</a>

  <script type="module">
    import { auth, db, collection, getDocs, onAuthStateChanged } from "./js/firebase-init.js";

    const reelsContainer = document.getElementById("reelsContainer");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }
      
      const snap = await getDocs(collection(db, "posts"));
      let html = "";
      snap.forEach(docSnap => {
        const p = docSnap.data();
        if (p.mediaType === 'reel') {
          html += `
            <div style="padding: 15px; border-bottom: 1px solid #262626;">
              <a href="view-profile.html?uid=${p.userId}" style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px; text-decoration: none; color: #fff;">
                <div style="width: 32px; height: 32px; border-radius: 50%; background-image: url('${p.userPhoto}'); background-size: cover; background-position: center;"></div>
                <span style="font-weight: 600; font-size: 14px;">${p.username}</span>
              </a>
              <video controls src="${p.mediaUrl}" style="width: 100%; max-height: 450px; object-fit: cover; border-radius: 8px;"></video>
              <p style="margin-top: 8px; font-size: 14px;">${p.caption || ''}</p>
            </div>
          `;
        }
      });
      reelsContainer.innerHTML = html || `<p style="padding: 40px; text-align: center; color: #888;">No reels uploaded yet.</p>`;
    });
  </script>
</body>
</html>
