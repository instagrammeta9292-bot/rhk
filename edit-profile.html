<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile - RHK</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .edit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #262626;
      font-weight: bold;
    }
    .edit-body {
      padding: 20px;
      max-width: 400px;
      margin: 0 auto;
      text-align: center;
    }
    .avatar-wrapper {
      position: relative;
      width: 90px;
      height: 90px;
      margin: 0 auto 15px auto;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      background-color: #222;
      cursor: pointer;
    }
    .form-group {
      text-align: left;
      margin-bottom: 15px;
    }
    .form-group label {
      font-size: 12px;
      color: #888;
      display: block;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>

  <div class="edit-header">
    <a href="profile.html" style="color: #fff; text-decoration: none; font-size: 14px;">Cancel</a>
    <span>Edit Profile</span>
    <button type="button" id="saveBtn" style="background: none; border: none; color: #0095f6; font-weight: bold; font-size: 14px; cursor: pointer;">Save</button>
  </div>

  <div class="edit-body">
    <div class="avatar-wrapper" id="avatarPreview">
      <input type="file" id="avatarInput" accept="image/*" style="position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
    </div>
    <label for="avatarInput" style="color: #0095f6; font-size: 14px; font-weight: 600; cursor: pointer; display: block; margin-bottom: 25px;">Change profile photo</label>

    <form id="editForm">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="fullNameInput" class="input-field" required>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="usernameInput" class="input-field" required>
      </div>
      <div class="form-group">
        <label>Bio</label>
        <textarea id="bioInput" class="input-field" style="resize: none; height: 70px;"></textarea>
      </div>
    </form>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, updateDoc, onAuthStateChanged } from "./js/firebase-init.js";

    const CLOUD_NAME = "nhy9lfkt"; 
    const UPLOAD_PRESET = "rhk_upload";

    const avatarInput = document.getElementById("avatarInput");
    const avatarPreview = document.getElementById("avatarPreview");
    const fullNameInput = document.getElementById("fullNameInput");
    const usernameInput = document.getElementById("usernameInput");
    const bioInput = document.getElementById("bioInput");
    const saveBtn = document.getElementById("saveBtn");

    let currentUser = null;
    let uploadedImageUrl = "";

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) {
          const data = snap.data();
          fullNameInput.value = data.fullName || "";
          usernameInput.value = data.username || "";
          bioInput.value = data.bio || "";
          if (data.photoURL) {
            uploadedImageUrl = data.photoURL;
            avatarPreview.style.backgroundImage = `url('${data.photoURL}')`;
          }
        }
      } else {
        window.location.href = "index.html";
      }
    });

    avatarInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      avatarPreview.style.backgroundImage = `url('${URL.createObjectURL(file)}')`;
      saveBtn.innerText = "Uploading...";
      saveBtn.disabled = true;

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);

      try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
          method: "POST",
          body: formData
        });
        const data = await response.json();
        
        if (data.secure_url) {
          uploadedImageUrl = data.secure_url;
          saveBtn.innerText = "Save";
          saveBtn.disabled = false;
        } else {
          alert("Image upload failed: " + (data.error?.message || "Unknown error"));
          saveBtn.innerText = "Save";
          saveBtn.disabled = false;
        }
      } catch (error) {
        console.error("Network error:", error);
        alert("Image upload failed due to connection error.");
        saveBtn.innerText = "Save";
        saveBtn.disabled = false;
      }
    });

    saveBtn.addEventListener("click", async () => {
      if (!currentUser) return;

      saveBtn.innerText = "Saving...";
      saveBtn.disabled = true;

      try {
        await updateDoc(doc(db, "users", currentUser.uid), {
          fullName: fullNameInput.value.trim(),
          username: usernameInput.value.trim().toLowerCase(),
          bio: bioInput.value.trim(),
          photoURL: uploadedImageUrl
        });

        window.location.href = "profile.html";
      } catch (error) {
        console.error("Firestore error:", error);
        alert("Error updating profile settings.");
        saveBtn.innerText = "Save";
        saveBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
