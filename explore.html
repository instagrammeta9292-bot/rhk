<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK - Explore</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background-color: #000; color: #fff; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .explore-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; padding-bottom: 60px; }
    .grid-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #111; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
    .bottom-nav a { font-size: 22px; text-decoration: none; color: #fff; }
  </style>
</head>
<body>

  <div style="padding: 12px 16px; font-weight: bold; border-bottom: 1px solid #262626;">Explore</div>
  <div id="exploreGrid" class="explore-grid">
    <div style="grid-column: span 3; text-align: center; color: #888; margin-top: 40px;">Loading explore...</div>
  </div>

  <!-- Bottom Navigation Bar -->
  <div class="bottom-nav">
    <a href="home.html">🏠</a>
    <a href="explore.html">🔍</a>
    <a href="upload.html?type=post">➕</a>
    <a href="profile.html">👤</a>
  </div>

  <script type="module">
    import { auth, db, collection, getDocs, onAuthStateChanged } from "./js/firebase-init.js";

    const exploreGrid = document.getElementById("exploreGrid");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      try {
        const querySnapshot = await getDocs(collection(db, "posts"));
        exploreGrid.innerHTML = "";

        if (querySnapshot.empty) {
          exploreGrid.innerHTML = `<div style="grid-column: span 3; text-align: center; color: #888; padding: 40px;">No posts available</div>`;
          return;
        }

        querySnapshot.forEach((doc) => {
          const post = doc.data();
          const img = document.createElement("img");
          img.src = post.mediaUrl;
          img.className = "grid-img";
          exploreGrid.appendChild(img);
        });
      } catch (err) {
        console.error("Error loading explore:", err);
      }
    });
  </script>
</body>
</html>
