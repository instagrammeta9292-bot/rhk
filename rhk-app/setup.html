<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK - Create Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="setup-container">
    <div class="setup-box">
      <div class="rhk-logo">RHK</div>
      <p style="margin-bottom: 20px; font-size: 14px; color: #8e8e8e;">Set up your profile to continue</p>
      
      <form id="setupForm">
        <div class="avatar-upload-container">
          <div id="avatarPreview" class="avatar-preview"></div>
          <label for="avatarInput" style="color: #0095f6; font-size: 14px; font-weight: 600; cursor: pointer;">
            Add Profile Photo
          </label>
          <input type="file" id="avatarInput" accept="image/*" style="display: none;">
        </div>

        <input type="text" id="usernameInput" class="input-field" placeholder="Username" required>
        <input type="text" id="fullNameInput" class="input-field" placeholder="Full Name" required>
        <textarea id="bioInput" class="input-field" placeholder="Bio..." style="resize: none; height: 65px;"></textarea>
        
        <button type="submit" id="submitBtn" class="primary-btn">Start Using RHK</button>
      </form>
    </div>
  </div>

  <script type="module" src="js/setup.js"></script>
</body>
</html>
