<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK - Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Prevent flash of login content before auth check completes */
    body { opacity: 0; transition: opacity 0.2s ease-in; background: #000; color: #fff; }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="content-box" style="max-width: 380px; text-align: center; padding: 40px 20px;">
      <h1 class="rhk-brand-logo" style="font-size: 42px; margin-bottom: 30px;">RHK</h1>
      <p style="color: #a8a8a8; margin-bottom: 30px; font-size: 15px;">Connect with friends and share moments on RHK.</p>
      
      <button id="googleLoginBtn" class="primary-btn" style="display: flex; align-items: center; justify-content: center; gap: 10px; background: #fff; color: #000; font-weight: 600;">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v4.51h6.6c-.29 1.52-1.14 2.82-2.4 3.68v3.05h3.88c2.27-2.09 3.66-5.17 3.66-9.17z"/><path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.88-3.05c-1.08.72-2.45 1.16-4.05 1.16-3.13 0-5.78-2.11-6.73-4.96H1.19v3.15C3.17 21.31 7.23 24 12 24z"/><path fill="#FBBC05" d="M5.27 14.24c-.25-.72-.38-1.49-.38-2.24s.13-1.52.38-2.24V6.6H1.19C.43 8.13 0 9.87 0 12s.43 3.87 1.19 5.4l4.08-3.16z"/><path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0 7.23 0 3.17 2.69 1.19 6.6l4.08 3.15c.95-2.85 3.6-4.96 6.73-4.96z"/></svg>
        Continue with Google
      </button>
    </div>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, setDoc } from "./js/firebase-init.js";
    import { GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const googleLoginBtn = document.getElementById("googleLoginBtn");

    // Instantly check authentication to route properly without flashing login elements
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // User is logged in, check if profile setup exists
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (userSnap.exists()) {
          window.location.replace("home.html");
        } else {
          window.location.replace("setup.html");
        }
      } else {
        // User not logged in, reveal the login screen safely
        document.body.style.opacity = "1";
      }
    });

    googleLoginBtn.addEventListener("click", async () => {
      const provider = new GoogleAuthProvider();
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          // Generate a clean default username from email
          const baseUsername = user.email.split('@')[0].toLowerCase().replace(/[^a-z0-9]/g, '');
          await setDoc(userRef, {
            uid: user.uid,
            username: baseUsername,
            fullName: user.displayName || "RHK User",
            bio: "",
            photoURL: user.photoURL || "https://icon-library.com/images/default-profile-icon/default-profile-icon-24.jpg",
            following: [],
            followers: [],
            createdAt: new Date().toISOString()
          });
          window.location.href = "setup.html";
        } else {
          window.location.href = "home.html";
        }
      } catch (error) {
        console.error("Login Error:", error);
        alert("Google Login Failed: " + error.message);
      }
    });
  </script>
</body>
</html>
