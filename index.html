<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK - Sign In</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Splash Screen Style */
    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    
    /* Hide auth container initially */
    .auth-container {
      display: none;
    }
  </style>
</head>
<body>

  <!-- RHK Brand Splash Screen -->
  <div id="splashScreen">
    <div class="rhk-brand-logo" style="font-size: 42px; margin-bottom: 12px; color: #fff;">RHK</div>
    <p style="color: #888; font-size: 14px; font-family: sans-serif; letter-spacing: 1px;">Loading Experience...</p>
  </div>

  <div class="auth-container" id="authContainer">
    <div class="auth-box">
      <div class="rhk-brand-logo" style="font-size: 32px; margin-bottom: 20px;">RHK</div>
      <p style="margin-bottom: 24px; color: #a8a8a8; font-size: 14px;">Connect & Share with your network</p>
      <button id="googleLoginBtn" class="google-btn">Continue with Google</button>
    </div>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, onAuthStateChanged } from "./js/firebase-init.js";

    const splashScreen = document.getElementById("splashScreen");
    const authContainer = document.getElementById("authContainer");

    // Instantly check authentication state on load
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // User is logged in: verify profile setup and go straight to home
        try {
          const userDoc = await getDoc(doc(db, "users", user.uid));
          if (userDoc.exists()) {
            window.location.replace("home.html");
          } else {
            window.location.replace("setup.html");
          }
        } catch (error) {
          console.error("Profile check error:", error);
          window.location.replace("home.html");
        }
      } else {
        // User is not logged in: hide splash screen and display the login card smoothly
        splashScreen.style.display = "none";
        authContainer.style.display = "flex";
      }
    });
  </script>
  
  <script type="module" src="js/auth.js"></script>
</body>
</html>
