<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK - Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Initially hide auth container to prevent layout flash while checking session */
    #authContainer {
      display: none;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div id="authContainer" class="content-box" style="max-width: 380px; text-align: center;">
      <div class="rhk-brand-logo" style="margin-bottom: 20px; font-size: 28px; font-weight: bold;">RHK MUSIC</div>
      <p style="color: #aaa; font-size: 14px; margin-bottom: 25px;">Connect and share your vibe with friends</p>
      
      <button id="googleLoginBtn" class="primary-btn" style="display: flex; align-items: center; justify-content: center; gap: 10px; background-color: #fff; color: #000; font-weight: 500;">
        <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- Smooth Loading Spinner while checking session -->
    <div id="pageLoader" style="color: #888; font-size: 14px; text-align: center; margin-top: 50px;">
      Loading RHK...
    </div>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "./js/firebase-init.js";

    const googleLoginBtn = document.getElementById("googleLoginBtn");
    const authContainer = document.getElementById("authContainer");
    const pageLoader = document.getElementById("pageLoader");
    const provider = new GoogleAuthProvider();

    // Intercept auth state instantly before displaying login options
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // User is already logged in, check if profile setup exists
        try {
          const userDoc = await getDoc(doc(db, "users", user.uid));
          if (userDoc.exists()) {
            window.location.replace("home.html");
          } else {
            window.location.replace("setup.html");
          }
        } catch (error) {
          console.error("Session verification error:", error);
          window.location.replace("home.html");
        }
      } else {
        // User is logged out: Hide loader, show the login button container smoothly
        pageLoader.style.display = "none";
        authContainer.style.display = "block";
      }
    });

    // Handle Google Sign In click
    googleLoginBtn.addEventListener("click", async () => {
      googleLoginBtn.disabled = true;
      googleLoginBtn.innerText = "Signing in...";

      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          window.location.replace("home.html");
        } else {
          window.location.replace("setup.html");
        }
      } catch (error) {
        console.error("Login popup error:", error);
        alert("Google Sign-In failed: " + error.message);
        googleLoginBtn.disabled = false;
        googleLoginBtn.innerHTML = `
          <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google`;
      }
    });
  </script>
</body>
</html>
