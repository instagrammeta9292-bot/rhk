<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK - Sign In</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    .auth-container {
      display: none;
    }
  </style>
</head>
<body>

  <div id="splashScreen">
    <div class="rhk-brand-logo" style="font-size: 42px; margin-bottom: 12px; color: #fff;">RHK</div>
    <p style="color: #888; font-size: 14px; font-family: sans-serif; letter-spacing: 1px;">Loading Experience...</p>
  </div>

  <div class="auth-container" id="authContainer">
    <div class="auth-box">
      <div class="rhk-brand-logo" style="font-size: 32px; margin-bottom: 20px;">RHK</div>
      <p style="margin-bottom: 24px; color: #a8a8a8; font-size: 14px;">Connect & Share with your network</p>
      
      <form id="loginForm">
        <input type="email" id="emailInput" class="input-field" placeholder="Email" required>
        <input type="password" id="passwordInput" class="input-field" placeholder="Password" required>
        <button type="submit" id="loginBtn" class="primary-btn" style="margin-bottom: 12px;">Sign In</button>
      </form>
      
      <p id="toggleModeText" style="color: #888; font-size: 13px; cursor: pointer;">Don't have an account? <span style="color: #0095f6; font-weight: 600;">Sign up</span></p>
    </div>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, onAuthStateChanged } from "./js/firebase-init.js";

    const splashScreen = document.getElementById("splashScreen");
    const authContainer = document.getElementById("authContainer");

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          const userDoc = await getDoc(doc(db, "users", user.uid));
          if (userDoc.exists()) {
            window.location.replace("home.html");
          } else {
            window.location.replace("setup.html");
          }
        } catch (error) {
          console.error("Profile check error:", error);
          window.location.replace("home.html");
        }
      } else {
        splashScreen.style.display = "none";
        authContainer.style.display = "flex";
      }
    });
  </script>
  
  <script type="module" src="js/auth.js"></script>
</body>
</html>
