<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK - Welcome</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Splash Screen Styling */
    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .brand-logo-text {
      font-size: 3rem;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 3px;
      margin-bottom: 10px;
      font-family: sans-serif;
    }
    .brand-logo-text span {
      color: #0095f6;
    }
    .brand-tagline {
      color: #888888;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #0095f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 30px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    /* Hidden class for smooth transition */
    .hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- RHK Brand Entry Splash Screen -->
  <div id="splashScreen">
    <div class="brand-logo-text">R<span>H</span>K</div>
    <div class="brand-tagline">Connecting Worlds</div>
    <div class="spinner"></div>
  </div>

  <!-- Main Login Container (Hidden until auth state is confirmed as logged out) -->
  <div class="page-container" id="loginContainer" style="display: none;">
    <div class="content-box" style="max-width: 350px; text-align: center;">
      <div class="rhk-brand-logo" style="font-size: 2.5rem; margin-bottom: 25px;">RHK</div>
      
      <p style="color: #aaa; font-size: 14px; margin-bottom: 25px;">Sign in to share your moments with friends.</p>

      <button id="googleLoginBtn" class="primary-btn" style="background-color: #ffffff; color: #000000; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; border: none; cursor: pointer;">
        <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.7 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>
    </div>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "./js/firebase-init.js";

    const splashScreen = document.getElementById("splashScreen");
    const loginContainer = document.getElementById("loginContainer");
    const googleLoginBtn = document.getElementById("googleLoginBtn");

    // Check Authentication State instantly with RHK Branding Splash
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // User is logged in, check if profile setup is complete in Firestore
        try {
          const userDocRef = doc(db, "users", user.uid);
          const userSnap = await getDoc(userDocRef);

          if (userSnap.exists()) {
            // Profile exists, go straight to home
            window.location.href = "home.html";
          } else {
            // Profile doesn't exist yet, send to setup page
            window.location.href = "setup.html";
          }
        } catch (error) {
          console.error("Error checking user profile:", error);
          window.location.href = "home.html";
        }
      } else {
        // User is NOT logged in: Hide splash screen smoothly and show Google login UI
        splashScreen.classList.add("hidden");
        setTimeout(() => {
          splashScreen.style.display = "none";
          loginContainer.style.display = "flex";
        }, 500);
      }
    });

    // Handle Google Login Trigger
    googleLoginBtn.addEventListener("click", async () => {
      const provider = new GoogleAuthProvider();
      try {
        googleLoginBtn.innerText = "Signing in...";
        googleLoginBtn.disabled = true;
        
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        // Check if user already has a document set up
        const userDocRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userDocRef);

        if (userSnap.exists()) {
          window.location.href = "home.html";
        } else {
          window.location.href = "setup.html";
        }
      } catch (error) {
        console.error("Google login error:", error);
        alert("Login failed: " + error.message);
        googleLoginBtn.disabled = false;
        googleLoginBtn.innerHTML = `
          <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.7 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google`;
      }
    });
  </script>
</body>
</html>
