<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK - Welcome</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Splash Screen Styling */
    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .splash-logo {
      font-size: 3rem;
      font-weight: bold;
      color: #fff;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    .splash-sub {
      color: #888;
      font-size: 1rem;
    }
    /* Hidden utility class */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- RHK Brand Splash Screen (Shown only for logged-in users) -->
  <div id="splashScreen" class="hidden">
    <div class="splash-logo">RHK</div>
    <div class="splash-sub">Loading your experience...</div>
  </div>

  <!-- Normal Login View (Shown only for unauthenticated users) -->
  <div class="page-container" id="loginContainer" class="hidden">
    <div class="content-box" style="text-align: center; max-width: 350px;">
      <div class="rhk-brand-logo" style="font-size: 2.5rem; margin-bottom: 20px;">RHK</div>
      <p style="color: #aaa; margin-bottom: 30px; font-size: 14px;">Connect, share, and explore with your community.</p>
      
      <button id="googleLoginBtn" class="primary-btn" style="display: flex; align-items: center; justify-content: center; gap: 10px; background-color: #fff; color: #000; font-weight: 500;">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v4.51h6.6c-.29 1.52-1.14 2.82-2.4 3.68v3.05h3.88c2.27-2.09 3.66-5.17 3.66-9.17z"/>
          <path fill="#34A853" d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.88-3.05c-1.08.72-2.45 1.16-4.05 1.16-3.13 0-5.78-2.11-6.73-4.96H1.18v3.15C3.15 21.32 7.22 24 12 24z"/>
          <path fill="#FBBC05" d="M5.27 14.24c-.25-.72-.38-1.49-.38-2.24s.13-1.52.38-2.24V6.61H1.18C.43 8.14 0 9.87 0 12s.43 3.86 1.18 5.39l4.09-3.15z"/>
          <path fill="#EA4335" d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.42-3.42C17.95 1.19 15.24 0 12 0 7.22 0 3.15 2.68 1.18 6.61l4.09 3.15c.95-2.85 3.6-4.96 6.73-4.96z"/>
        </svg>
        Continue with Google
      </button>
    </div>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "./js/firebase-init.js";

    const splashScreen = document.getElementById("splashScreen");
    const loginContainer = document.getElementById("loginContainer");
    const googleLoginBtn = document.getElementById("googleLoginBtn");

    // Initially hide both until Firebase resolves the auth state to prevent UI blinking
    splashScreen.classList.add("hidden");
    loginContainer.classList.add("hidden");

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // User IS logged in: Show RHK brand splash screen
        splashScreen.classList.remove("hidden");
        loginContainer.classList.add("hidden");

        try {
          // Check if user profile setup exists in Firestore
          const userDoc = await getDoc(doc(db, "users", user.uid));
          
          // Wait for exactly 5 seconds (5000 milliseconds)
          setTimeout(() => {
            if (userDoc.exists()) {
              window.location.href = "home.html";
            } else {
              window.location.href = "setup.html";
            }
          }, 5000);
        } catch (error) {
          console.error("Error checking user document:", error);
          // Fallback redirect after 5 seconds even if Firestore errors out
          setTimeout(() => {
            window.location.href = "home.html";
          }, 5000);
        }

      } else {
        // User IS NOT logged in: Hide splash, show Continue with Google button
        splashScreen.classList.add("hidden");
        loginContainer.classList.remove("hidden");
      }
    });

    // Handle Google Login Trigger
    googleLoginBtn.addEventListener("click", async () => {
      const provider = new GoogleAuthProvider();
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        
        // Check if user has already completed setup
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          window.location.href = "home.html";
        } else {
          window.location.href = "setup.html";
        }
      } catch (error) {
        console.error("Login Error:", error);
        alert("Google Login failed: " + error.message);
      }
    });
  </script>
</body>
</html>
