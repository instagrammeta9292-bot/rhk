<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK - Profile</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background-color: #000; color: #fff; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .profile-header { padding: 20px 16px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #262626; }
    .profile-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: #333; }
    .profile-info { flex: 1; }
    .profile-username { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
    .profile-bio { font-size: 13px; color: #ccc; margin-top: 5px; }
    .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; padding-bottom: 60px; }
    .grid-item { width: 100%; aspect-ratio: 1; background: #111; object-fit: cover; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 50px; background: #000; border-top: 1px solid #262626; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
    .bottom-nav a { font-size: 22px; text-decoration: none; color: #fff; }
  </style>
</head>
<body>

  <div class="profile-header">
    <img id="userAvatar" src="https://icon-library.com/images/default-profile-icon/default-profile-icon-24.jpg" class="profile-avatar">
    <div class="profile-info">
      <div id="usernameDisplay" class="profile-username">loading...</div>
      <div id="fullNameDisplay" style="font-size: 14px; font-weight: 500;"></div>
      <div id="bioDisplay" class="profile-bio"></div>
    </div>
  </div>

  <div id="userPostsGrid" class="grid-container">
    <!-- User posts grid -->
  </div>

  <!-- Bottom Navigation Bar -->
  <div class="bottom-nav">
    <a href="home.html">🏠</a>
    <a href="explore.html">🔍</a>
    <a href="upload.html?type=post">➕</a>
    <a href="profile.html">👤</a>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, collection, query, where, getDocs, onAuthStateChanged } from "./js/firebase-init.js";

    const urlParams = new URLSearchParams(window.location.search);
    const targetUid = urlParams.get("uid");

    const userAvatar = document.getElementById("userAvatar");
    const usernameDisplay = document.getElementById("usernameDisplay");
    const fullNameDisplay = document.getElementById("fullNameDisplay");
    const bioDisplay = document.getElementById("bioDisplay");
    const userPostsGrid = document.getElementById("userPostsGrid");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }
      const profileId = targetUid || user.uid;
      loadUserProfile(profileId);
    });

    async function loadUserProfile(uid) {
      try {
        const userSnap = await getDoc(doc(db, "users", uid));
        if (userSnap.exists()) {
          const data = userSnap.data();
          usernameDisplay.innerText = data.username || "user";
          fullNameDisplay.innerText = data.fullName || "";
          bioDisplay.innerText = data.bio || "";
          if (data.photoURL) userAvatar.src = data.photoURL;
        }

        // Fetch User Posts
        const q = query(collection(db, "posts"), where("userId", "==", uid));
        const postSnaps = await getDocs(q);
        
        userPostsGrid.innerHTML = "";
        if (postSnaps.empty) {
          userPostsGrid.innerHTML = `<div style="grid-column: span 3; text-align: center; color: #888; padding: 40px;">No posts yet</div>`;
          return;
        }

        postSnaps.forEach((docSnap) => {
          const post = docSnap.data();
          const media = document.createElement("img");
          media.src = post.mediaUrl;
          media.className = "grid-item";
          userPostsGrid.appendChild(media);
        });
      } catch (err) {
        console.error("Error loading profile:", err);
      }
    }
  </script>
</body>
</html>
