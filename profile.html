<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-container" style="justify-content: flex-start; padding-top: 30px;">
    <div class="content-box" style="max-width: 420px;">
      <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 20px;">
        <div id="myAvatar" style="width: 80px; height: 80px; border-radius: 50%; background-size: cover; background-position: center; background-color: #222; margin-bottom: 12px;"></div>
        <h3 id="myUsername" style="font-size: 18px; margin-bottom: 4px;"></h3>
        <p id="myFullName" style="color: #888; font-size: 13px; margin-bottom: 12px;"></p>
        <p id="myBio" style="font-size: 14px; margin-bottom: 20px; text-align: center;"></p>
      </div>
      <button id="logoutBtn" class="logout-btn">Log Out</button>
    </div>
  </div>

  <!-- Bottom Navigation Bar -->
  <nav class="bottom-nav">
    <a href="home.html"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
    <a href="explore.html"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></a>
    <a href="reels.html"><svg viewBox="0 0 24 24"><path d="M18 3H6c-1.66 0-3 1.34-3 3v12c0 1.66 1.34 3 3 3h12c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3zm-9 13.5v-9l7 4.5-7 4.5z"/></svg></a>
    <a href="upload.html"><svg viewBox="0 0 24 24"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg></a>
    <a href="profile.html"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg></a>
  </nav>

  <script type="module">
    import { auth, signOut, onAuthStateChanged, db, doc, getDoc } from "./js/firebase-init.js";

    const myAvatar = document.getElementById("myAvatar");
    const myUsername = document.getElementById("myUsername");
    const myFullName = document.getElementById("myFullName");
    const myBio = document.getElementById("myBio");
    const logoutBtn = document.getElementById("logoutBtn");

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) {
          const data = snap.data();
          myAvatar.style.backgroundImage = `url('${data.photoURL}')`;
          myUsername.innerText = `@${data.username}`;
          myFullName.innerText = data.fullName;
          myBio.innerText = data.bio || "";
        }
      } else {
        window.location.href = "index.html";
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
