<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK - Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-container" style="padding-bottom: 70px;">
    <!-- Profile Header Top Bar -->
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #222; background: #000; position: sticky; top: 0; z-index: 100;">
      <a href="home.html" style="color: #fff; text-decoration: none; font-size: 20px;">←</a>
      <span id="profileUsernameHeader" style="font-weight: 600; font-size: 16px;">profile</span>
      <div style="width: 20px;"></div>
    </div>

    <!-- Profile Info Section -->
    <div style="padding: 20px 16px; max-width: 600px; margin: 0 auto; width: 100%;">
      <div style="display: flex; align-items: center; gap: 24px; margin-bottom: 15px;">
        <div id="profileAvatar" style="width: 80px; height: 80px; border-radius: 50%; background-size: cover; background-position: center; background-color: #333;"></div>
        <div style="display: flex; justify-content: space-around; flex-grow: 1; text-align: center;">
          <div>
            <div id="postsCount" style="font-weight: bold; font-size: 16px;">0</div>
            <div style="font-size: 12px; color: #aaa;">Posts</div>
          </div>
          <div>
            <div id="followersCount" style="font-weight: bold; font-size: 16px;">0</div>
            <div style="font-size: 12px; color: #aaa;">Followers</div>
          </div>
          <div>
            <div id="followingCount" style="font-weight: bold; font-size: 16px;">0</div>
            <div style="font-size: 12px; color: #aaa;">Following</div>
          </div>
        </div>
      </div>

      <div style="margin-bottom: 15px;">
        <div id="profileFullName" style="font-weight: 600; font-size: 15px;"></div>
        <div id="profileBio" style="font-size: 14px; color: #ddd; margin-top: 4px; white-space: pre-wrap;"></div>
      </div>

      <!-- Dynamic Action Buttons (Follow / Message or Edit Profile) -->
      <div id="actionButtonsContainer" style="display: flex; gap: 8px; margin-bottom: 20px;">
        <!-- Injected via JS -->
      </div>

      <!-- User's Posts Grid -->
      <div style="border-top: 1px solid #222; padding-top: 10px;">
        <div style="text-align: center; font-size: 12px; letter-spacing: 1px; color: #888; margin-bottom: 10px; font-weight: bold;">POSTS</div>
        <div id="userPostsGrid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;">
          <!-- Posts rendered here -->
        </div>
      </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <div class="bottom-nav">
      <a href="home.html" class="nav-item">🏠</a>
      <a href="search.html" class="nav-item">🔍</a>
      <a href="upload.html" class="nav-item">➕</a>
      <a href="notifications.html" class="nav-item">❤️</a>
      <a href="profile.html" class="nav-item active" id="myProfileNav">👤</a>
    </div>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, updateDoc, arrayUnion, arrayRemove, collection, query, where, getDocs, addDoc, orderBy } from "./js/firebase-init.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const urlParams = new URLSearchParams(window.location.search);
    const targetUserId = urlParams.get("uid");

    const profileUsernameHeader = document.getElementById("profileUsernameHeader");
    const profileAvatar = document.getElementById("profileAvatar");
    const profileFullName = document.getElementById("profileFullName");
    const profileBio = document.getElementById("profileBio");
    const postsCount = document.getElementById("postsCount");
    const followersCount = document.getElementById("followersCount");
    const followingCount = document.getElementById("followingCount");
    const actionButtonsContainer = document.getElementById("actionButtonsContainer");
    const userPostsGrid = document.getElementById("userPostsGrid");
    const myProfileNav = document.getElementById("myProfileNav");

    onAuthStateChanged(auth, async (currentUser) => {
      if (!currentUser) {
        window.location.href = "index.html";
        return;
      }

      // Determine whose profile to load (target user from URL or logged-in user)
      const profileId = targetUserId || currentUser.uid;
      const isMyProfile = profileId === currentUser.uid;

      if (isMyProfile) {
        myProfileNav.style.color = "#0095f6";
      }

      // Fetch profile data
      const userSnap = await getDoc(doc(db, "users", profileId));
      if (!userSnap.exists()) {
        alert("User not found!");
        window.location.href = "home.html";
        return;
      }

      const userData = userSnap.data();
      profileUsernameHeader.innerText = userData.username;
      profileAvatar.style.backgroundImage = `url('${userData.photoURL || "https://icon-library.com/images/default-profile-icon/default-profile-icon-24.jpg"}')`;
      profileFullName.innerText = userData.fullName || "";
      profileBio.innerText = userData.bio || "";
      followersCount.innerText = (userData.followers || []).length;
      followingCount.innerText = (userData.following || []).length;

      // Handle Action Buttons
      if (isMyProfile) {
        actionButtonsContainer.innerHTML = `
          <a href="edit-profile.html" class="secondary-btn" style="flex: 1; text-align: center; text-decoration: none; padding: 7px; background: #262626; color: #fff; border-radius: 6px; font-weight: 600; font-size: 14px;">Edit Profile</a>
        `;
      } else {
        const isFollowing = (userData.followers || []).includes(currentUser.uid);
        actionButtonsContainer.innerHTML = `
          <button id="followBtn" class="${isFollowing ? 'secondary-btn' : 'primary-btn'}" style="flex: 1; padding: 7px; border-radius: 6px; font-weight: 600; font-size: 14px; background: ${isFollowing ? '#262626' : '#0095f6'}; color: #fff; border: none; cursor: pointer;">
            ${isFollowing ? 'Following' : 'Follow'}
          </button>
          <button id="messageBtn" class="secondary-btn" style="flex: 1; padding: 7px; background: #262626; color: #fff; border: none; border-radius: 6px; font-weight: 600; font-size: 14px; cursor: pointer;">
            Message
          </button>
        `;

        // Follow / Unfollow logic
        document.getElementById("followBtn").addEventListener("click", async () => {
          const targetRef = doc(db, "users", profileId);
          const myRef = doc(db, "users", currentUser.uid);

          const currentlyFollowing = document.getElementById("followBtn").innerText === "Following";

          if (currentlyFollowing) {
            await updateDoc(targetRef, { followers: arrayRemove(currentUser.uid) });
            await updateDoc(myRef, { following: arrayRemove(profileId) });
            document.getElementById("followBtn").innerText = "Follow";
            document.getElementById("followBtn").style.background = "#0095f6";
            followersCount.innerText = parseInt(followersCount.innerText) - 1;
          } else {
            await updateDoc(targetRef, { followers: arrayUnion(currentUser.uid) });
            await updateDoc(myRef, { following: arrayUnion(profileId) });
            document.getElementById("followBtn").innerText = "Following";
            document.getElementById("followBtn").style.background = "#262626";
            followersCount.innerText = parseInt(followersCount.innerText) + 1;
          }
        });

        // Chat / Message redirection logic
        document.getElementById("messageBtn").addEventListener("click", async () => {
          // Check if a chat conversation already exists between these two users
          const chatsRef = collection(db, "chats");
          const q = query(chatsRef, where("participants", "array-contains", currentUser.uid));
          const querySnapshot = await getDocs(q);

          let existingChatId = null;
          querySnapshot.forEach((docSnap) => {
            const data = docSnap.data();
            if (data.participants && data.participants.includes(profileId)) {
              existingChatId = docSnap.id;
            }
          });

          if (existingChatId) {
            window.location.href = `chat-room.html?chatId=${existingChatId}`;
          } else {
            // Create a new chat session document
            const newChatRef = await addDoc(chatsRef, {
              participants: [currentUser.uid, profileId],
              lastMessage: "",
              updatedAt: new Date().toISOString()
            });
            window.location.href = `chat-room.html?chatId=${newChatRef.id}`;
          }
        });
      }

      // Load User's Posts
      const postsQuery = query(collection(db, "posts"), where("userId", "==", profileId));
      const postSnapshots = await getDocs(postsQuery);
      postsCount.innerText = postSnapshots.size;

      userPostsGrid.innerHTML = "";
      if (postSnapshots.empty) {
        userPostsGrid.innerHTML = `<div style="grid-column: span 3; text-align: center; color: #777; padding: 40px; font-size: 14px;">No posts yet</div>`;
      } else {
        postSnapshots.forEach((docSnap) => {
          const post = docSnap.data();
          const item = document.createElement("div");
          item.style.aspectRatio = "1/1";
          item.style.backgroundColor = "#111";
          item.style.overflow = "hidden";
          item.style.position = "relative";

          if (post.mediaType === 'reel' || (post.mediaUrl && post.mediaUrl.includes('.mp4'))) {
            item.innerHTML = `<video src="${post.mediaUrl}" style="width: 100%; height: 100%; object-fit: cover;"></video>`;
          } else {
            item.innerHTML = `<img src="${post.mediaUrl}" style="width: 100%; height: 100%; object-fit: cover;">`;
          }
          userPostsGrid.appendChild(item);
        });
      }
    });
  </script>
</body>
</html>
