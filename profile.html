<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK - Edit Profile</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .profile-edit-container {
      max-width: 450px;
      margin: 20px auto;
      padding: 20px;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .avatar-upload-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }
    .profile-avatar-preview {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      background-color: #262626;
      border: 2px solid #dbdbdb;
      margin-bottom: 12px;
      cursor: pointer;
      position: relative;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }
    .input-field {
      width: 100%;
      padding: 10px 12px;
      background: #121212;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
    }
    .input-field:focus {
      border-color: #0095f6;
      outline: none;
    }
    .save-btn {
      width: 100%;
      background-color: #0095f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 12px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      margin-top: 10px;
    }
    .save-btn:active {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="profile-edit-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <a href="home.html" style="color: #fff; text-decoration: none; font-size: 16px;">Cancel</a>
      <h3 style="margin: 0; font-size: 16px;">Edit Profile</h3>
      <div style="width: 40px;"></div>
    </div>

    <form id="editProfileForm">
      <!-- Profile Photo Upload / Preview -->
      <div class="avatar-upload-section">
        <div id="avatarPreview" class="profile-avatar-preview" title="Click to change photo"></div>
        <label for="avatarInput" style="color: #0095f6; font-size: 14px; font-weight: 600; cursor: pointer;">
          Change Profile Photo
        </label>
        <input type="file" id="avatarInput" accept="image/*" style="display: none;">
      </div>

      <div class="form-group">
        <label>Name</label>
        <input type="text" id="fullNameInput" class="input-field" placeholder="Full name">
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="usernameInput" class="input-field" placeholder="Username">
      </div>

      <div class="form-group">
        <label>Bio</label>
        <textarea id="bioInput" class="input-field" style="resize: none; height: 70px;" placeholder="Bio"></textarea>
      </div>

      <!-- Explicit Save Button Added Here -->
      <button type="submit" id="saveBtn" class="save-btn">Save Changes</button>
    </form>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, setDoc, onAuthStateChanged } from "./js/firebase-init.js";

    const CLOUD_NAME = "nhy9lfkt";
    const UPLOAD_PRESET = "rhk_upload";

    const avatarInput = document.getElementById("avatarInput");
    const avatarPreview = document.getElementById("avatarPreview");
    const fullNameInput = document.getElementById("fullNameInput");
    const usernameInput = document.getElementById("usernameInput");
    const bioInput = document.getElementById("bioInput");
    const editProfileForm = document.getElementById("editProfileForm");
    const saveBtn = document.getElementById("saveBtn");

    let currentUser = null;
    let uploadedImageUrl = "https://icon-library.com/images/default-profile-icon/default-profile-icon-24.jpg";

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          const data = userDoc.data();
          fullNameInput.value = data.fullName || "";
          usernameInput.value = data.username || "";
          bioInput.value = data.bio || "";
          if (data.photoURL) {
            uploadedImageUrl = data.photoURL;
            avatarPreview.style.backgroundImage = `url('${uploadedImageUrl}')`;
          }
        }
      } else {
        window.location.href = "index.html";
      }
    });

    // Make avatar preview clickable as well as the text label
    avatarPreview.addEventListener("click", () => {
      avatarInput.click();
    });

    avatarInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      // Show local preview immediately
      avatarPreview.style.backgroundImage = `url('${URL.createObjectURL(file)}')`;
      saveBtn.disabled = true;
      saveBtn.innerText = "Uploading Photo...";

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);

      try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
          method: "POST",
          body: formData
        });
        const data = await response.json();

        if (data.secure_url) {
          uploadedImageUrl = data.secure_url;
          saveBtn.disabled = false;
          saveBtn.innerText = "Save Changes";
        } else {
          alert("Image upload failed: " + (data.error?.message || "Unknown error"));
          saveBtn.disabled = false;
          saveBtn.innerText = "Save Changes";
        }
      } catch (err) {
        console.error("Cloudinary error:", err);
        alert("Network error while uploading photo.");
        saveBtn.disabled = false;
        saveBtn.innerText = "Save Changes";
      }
    });

    editProfileForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentUser) return;

      saveBtn.disabled = true;
      saveBtn.innerText =andinavian || "Saving..."; // Saving text fallback

      try {
        await setDoc(doc(db, "users", currentUser.uid), {
          uid: currentUser.uid,
          fullName: fullNameInput.value.trim(),
          username: usernameInput.value.trim().toLowerCase(),
          bio: bioInput.value.trim(),
          photoURL: uploadedImageUrl
        }, { merge: true });

        window.location.href = "home.html";
      } catch (err) {
        console.error("Firestore error:", err);
        alert("Failed to save profile changes.");
        saveBtn.disabled = false;
        saveBtn.innerText = "Save Changes";
      }
    });
  </script>
</body>
</html>
