<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK - Upload Media</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-container">
    <div class="content-box">
      <div class="rhk-brand-logo" id="uploadTitle" style="margin-bottom: 15px;">New Upload</div>
      
      <form id="uploadForm">
        <div style="margin-bottom: 15px;">
          <input type="file" id="mediaInput" class="input-field" required>
        </div>
        <textarea id="captionInput" class="input-field" placeholder="Write a caption..." style="resize: none; height: 80px;"></textarea>
        <button type="submit" id="shareBtn" class="primary-btn">Share Now</button>
      </form>
      <br>
      <a href="home.html" style="color: #0095f6; text-decoration: none; font-size: 14px;">Cancel</a>
    </div>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, collection, addDoc, onAuthStateChanged } from "./js/firebase-init.js";

    const CLOUD_NAME = "nhy9Ifkt";
    const UPLOAD_PRESET = "rhk_upload";

    const urlParams = new URLSearchParams(window.location.search);
    const uploadType = urlParams.get("type") || "post"; // 'post', 'story', or 'reel'

    const uploadTitle = document.getElementById("uploadTitle");
    const mediaInput = document.getElementById("mediaInput");
    const uploadForm = document.getElementById("uploadForm");
    const captionInput = document.getElementById("captionInput");
    const shareBtn = document.getElementById("shareBtn");

    // Enforce file restrictions: Post = Images only; Story & Reel = Images or Videos
    if (uploadType === 'post') {
      uploadTitle.innerText = "New Post (Image Only)";
      mediaInput.accept = "image/*";
    } else if (uploadType === 'story') {
      uploadTitle.innerText = "New Story";
      mediaInput.accept = "image/*,video/*";
    } else {
      uploadTitle.innerText = "New Reel";
      mediaInput.accept = "video/*";
    }

    let currentUser = null;
    let userData = null;

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) userData = snap.data();
      } else {
        window.location.href = "index.html";
      }
    });

    uploadForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const file = mediaInput.files[0];
      if (!file || !userData) return;

      shareBtn.disabled = true;
      shareBtn.innerText = "Uploading via Cloudinary...";

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);

      // Determine resource type for Cloudinary (auto handles image vs video fast upload)
      const resourceType = file.type.startsWith('video') ? 'video' : 'image';

      try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${resourceType}/upload`, {
          method: "POST",
          body: formData
        });
        const data = await res.json();

        if (data.secure_url) {
          await addDoc(collection(db, "posts"), {
            userId: currentUser.uid,
            username: userData.username,
            userPhoto: userData.photoURL,
            mediaUrl: data.secure_url,
            mediaType: uploadType,
            caption: captionInput.value.trim(),
            createdAt: new Date().toISOString()
          });

          window.location.href = "home.html";
        }
      } catch (err) {
        console.error("Upload error:", err);
        alert("Failed to share.");
        shareBtn.disabled = false;
        shareBtn.innerText = "Share Now";
      }
    });
  </script>
</body>
</html>
