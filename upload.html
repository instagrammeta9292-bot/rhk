<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RHK - Media Upload</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-container">
    <div class="content-box" style="max-width: 400px; text-align: center;">
      <div class="rhk-brand-logo" id="uploadTitle" style="margin-bottom: 15px;">New Upload</div>
      
      <form id="uploadForm">
        <!-- Live Preview Box -->
        <div id="previewContainer" style="width: 100%; height: 240px; background: #1a1a1a; border: 2px dashed #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; position: relative; overflow: hidden; cursor: pointer;">
          <span id="previewPlaceholder" style="color: #888; font-size: 14px;">Tap to select from Gallery</span>
          <input type="file" id="mediaInput" required style="position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 10;">
        </div>

        <textarea id="captionInput" class="input-field" placeholder="Write a caption..." style="resize: none; height: 70px;"></textarea>
        <button type="submit" id="shareBtn" class="primary-btn">Share Now</button>
      </form>
      <br>
      <a href="home.html" style="color: #0095f6; text-decoration: none; font-size: 14px;">Cancel</a>
    </div>
  </div>

  <script type="module">
    import { auth, db, doc, getDoc, collection, addDoc, onAuthStateChanged } from "./js/firebase-init.js";

    // FIX: Cloud Name converted to strict lowercase as per your dashboard
    const CLOUD_NAME = "nhy9ifkt"; 
    const UPLOAD_PRESET = "rhk_upload"; 

    const urlParams = new URLSearchParams(window.location.search);
    const uploadType = urlParams.get("type") || "post";

    const uploadTitle = document.getElementById("uploadTitle");
    const mediaInput = document.getElementById("mediaInput");
    const previewContainer = document.getElementById("previewContainer");
    const uploadForm = document.getElementById("uploadForm");
    const captionInput = document.getElementById("captionInput");
    const shareBtn = document.getElementById("shareBtn");

    if (uploadType === 'post') {
      uploadTitle.innerText = "New Post";
      mediaInput.accept = "image/*";
    } else if (uploadType === 'story') {
      uploadTitle.innerText = "New Story";
      mediaInput.accept = "image/*,video/*";
    } else {
      uploadTitle.innerText = "New Reel";
      mediaInput.accept = "video/*";
    }

    mediaInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const fileURL = URL.createObjectURL(file);
      previewContainer.innerHTML = '';
      
      if (file.type.startsWith('video')) {
        const video = document.createElement("video");
        video.src = fileURL;
        video.controls = true;
        video.style.width = "100%";
        video.style.height = "100%";
        video.style.objectFit = "cover";
        previewContainer.appendChild(video);
      } else {
        const img = document.createElement("img");
        img.src = fileURL;
        img.style.width = "100%";
        img.style.height = "100%";
        img.style.objectFit = "cover";
        previewContainer.appendChild(img);
      }
      previewContainer.appendChild(mediaInput);
    });

    let currentUser = null;
    let userData = null;

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) userData = snap.data();
      } else {
        window.location.href = "index.html";
      }
    });

    uploadForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const file = mediaInput.files[0];
      if (!file) {
        alert("Please select a file first!");
        return;
      }
      if (!userData) {
        alert("User data still loading. Please try again in a moment.");
        return;
      }

      shareBtn.disabled = true;
      shareBtn.innerText = "Uploading... Please wait";

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);

      const resourceType = file.type.startsWith('video') ? 'video' : 'image';

      try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${resourceType}/upload`, {
          method: "POST",
          body: formData
        });
        
        const data = await res.json();

        if (data.secure_url) {
          await addDoc(collection(db, "posts"), {
            userId: currentUser.uid,
            username: userData.username,
            userPhoto: userData.photoURL || "https://icon-library.com/images/default-profile-icon/default-profile-icon-24.jpg",
            mediaUrl: data.secure_url,
            mediaType: uploadType,
            caption: captionInput.value.trim(),
            createdAt: new Date().toISOString()
          });

          window.location.href = "home.html";
        } else {
          console.error("Cloudinary Error:", data);
          alert("Cloudinary Upload Failed: " + (data.error?.message || "Unknown error"));
          shareBtn.disabled = false;
          shareBtn.innerText = "Share Now";
        }
      } catch (err) {
        console.error("Network Error:", err);
        alert("Network error during upload. Check console configuration.");
        shareBtn.disabled = false;
        shareBtn.innerText = "Share Now";
      }
    });
  </script>
</body>
</html>
